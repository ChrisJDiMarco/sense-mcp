<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="640" viewBox="0 0 1800 640" role="img" aria-labelledby="title desc">
  <title id="title">Sense MCP header artwork</title>
  <desc id="desc">Abstract privacy-first local context field around a developer workstation.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="42%" cy="44%" r="68%">
      <stop offset="0%" stop-color="#1f3a3c"/>
      <stop offset="36%" stop-color="#101827"/>
      <stop offset="72%" stop-color="#070a12"/>
      <stop offset="100%" stop-color="#03050b"/>
    </radialGradient>
    <radialGradient id="deskGlow" cx="45%" cy="42%" r="64%">
      <stop offset="0%" stop-color="#1ce2c4" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#8dd7ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="18%" stop-color="#dfe9f2"/>
      <stop offset="100%" stop-color="#7a889b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4fbff" stop-opacity="0.46"/>
      <stop offset="38%" stop-color="#7dd3fc" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="45%" stop-color="#67e8f9" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#a7f3d0" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.86 0 0 0 0 0.78 0 0 0 0.78 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="32" stdDeviation="28" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8dd7ff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <clipPath id="screenClip">
      <rect x="646" y="180" width="508" height="300" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1800" height="640" fill="url(#bgGlow)"/>
  <rect width="1800" height="640" fill="url(#grid)"/>
  <ellipse cx="805" cy="452" rx="680" ry="260" fill="url(#deskGlow)"/>
  <ellipse cx="925" cy="547" rx="520" ry="56" fill="#000814" opacity="0.52" filter="url(#softBlur)"/>

