      <path d="M44 20 C56 20 66 30 66 42 C66 56 55 68 44 68 C33 68 22 56 22 42 C22 30 32 20 44 20 Z" fill="none" stroke="#a7f3d0" stroke-opacity="0.76" stroke-width="4"/>
      <path d="M44 32 V45 L52 52" fill="none" stroke="#67e8f9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
