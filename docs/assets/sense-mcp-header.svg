    </g>
    <rect x="646" y="180" width="508" height="300" rx="22" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.14"/>
  </g>

  <g opacity="0.56" filter="url(#glow)">
    <circle cx="900" cy="320" r="232" fill="none" stroke="#67e8f9" stroke-opacity="0.15" stroke-width="2"/>
    <circle cx="900" cy="320" r="284" fill="none" stroke="#34d399" stroke-opacity="0.11" stroke-width="2" stroke-dasharray="12 18"/>
