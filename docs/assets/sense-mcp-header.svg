      <circle cx="949" cy="254" r="108" fill="#22c55e" opacity="0.10"/>
      <path d="M692 390 C752 342 814 333 886 360 C961 387 1026 344 1108 296" fill="none" stroke="#a7f3d0" stroke-opacity="0.46" stroke-width="2"/>
      <path d="M704 294 H1092" stroke="#8dd7ff" stroke-opacity="0.10"/>
